    <style>
        body {
            font-family: Arial, sans-serif;

        .metronome {
            text-align: center;
            background: #fff;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);

            cursor: pointer;
            border-radius: 12px;
            margin-top: 10px;

        .metronome button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

<body>
    <div class="metronome">
        <label for="bpm">BPM: </label>
        <input type="number" id="bpm" value="60" min="40" max="240" step="1">
        <br>
        <label for="noteType">节拍音符: </label>
        <select id="noteType">
            <option value="quarter">四分音符</option>
            <option value="eighth">八分音符</option>
            <option value="triplet">三连音</option>
            <option value="sixteenth">十六分音符</option>
        </select>
        <br><br>
        <button id="startBtn">开始</button>
        <button id="stopBtn" disabled>停止</button>
    </div>

  let s1 = '2024-11-4'; 
  s1 = new Date(s1.replace(/-/g, "/"));
  let s2 = new Date();
  let timeDifference = s2.getTime() - s1.getTime();

  let days = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
  let hours = Math.floor((timeDifference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  let minutes = Math.floor((timeDifference % (1000 * 60 * 60)) / (1000 * 60));

  let result = days + "天" + hours + "小时" + minutes + "分钟";
  document.getElementById('runningdays').innerHTML = result;
</script>
