







  
  <script src="/livereload.js?mindelay=10&amp;v=2&amp;port=1313&amp;path=livereload" data-no-instant defer></script><div id="passwordPrompt">
    <h2>文章加密</h2>
    <p>请输入密码查看文章内容：</p>
    <input type="password" id="password" placeholder="请输入密码">
    <button onclick="decryptContent()">解锁</button>
    <p id="error" style="color: red; display: none;">密码错误，请重试。</p>
  </div>

  <div id="encryptedContent" style="display: none;">
    <p>213123</p>

  </div>

  <script>
    function decryptContent() {
      const correctPassword = "123";
      const inputPassword = document.getElementById('password').value;

      if (inputPassword === correctPassword) {
        document.getElementById('passwordPrompt').style.display = 'none';
        document.getElementById('encryptedContent').style.display = 'block';
      } else {
        document.getElementById('error').style.display = 'block';
      }
    }
  </script>
