<body>
  <div class="timer-container">
    <div class="form-group">
      <div style="flex:1;">
        <label for="practiceContent">练习内容</label>
        <textarea id="practiceContent" placeholder="请输入练习内容"></textarea>
      </div>
      <div style="flex:1;">
        <label for="minutes">分钟</label>
        <input type="number" id="minutes" min="0" placeholder="" />
      </div>
      <div style="flex:1;">
        <label for="seconds">秒钟</label>
        <input type="number" id="seconds" min="0" placeholder="" />
      </div>
    </div>
    <div class="action-buttons">
      <button onclick="startTimer()">
        <img src="https://img.icons8.com/ios/50/ffffff/play.png" alt="开始" title="开始" />
      </button>
      <button onclick="pauseTimer()">
        <img src="https://img.icons8.com/ios/50/ffffff/pause.png" alt="暂停" title="暂停" />
      </button>
      <button onclick="resetTimer()">
        <img src="https://img.icons8.com/ios/50/ffffff/refresh.png" alt="重置" title="重置" />
      </button>
    </div>
    <div id="timerDisplay" class="hidden">
      <div class="timer">
        <div id="minuteBox"></div>
        <div>:</div>
        <div id="secondBox"></div>
      </div>
    </div>
    <div id="log" class="log"></div>
    <div class="action-buttons">
      <button onclick="clearAllRecords()">
        <img src="https://img.icons8.com/ios/50/ffffff/erase.png" alt="清空记录" title="清空记录" />
      </button>
      <button class="export-button" onclick="exportLog()">
        <img src="https://img.icons8.com/ios/50/ffffff/export.png" alt="导出" title="导出记录" />
      </button>
    </div>
  </div>
<script>
  let timer;
  let isPaused = false;
  let timeRemaining = 0; // 剩余时间（秒）
  let totalTime = 0; // 总时间（秒）
  const logContainer = document.getElementById("log");
  const audio = new Audio("https://www.soundjay.com/button/beep-07.wav");
  function startTimer() {
    if (isPaused) {
      // 如果是暂停状态，直接继续计时
      isPaused = false;
    } else {
      // 如果是初次开始，获取输入的时间
      const minutes = parseInt(document.getElementById("minutes").value, 10) || 0;
      const seconds = parseInt(document.getElementById("seconds").value, 10) || 0;
      if (minutes === 0 && seconds === 0) {
        alert("时间必须填写！");
        return;
      }
      // 初始化总时间和剩余时间
      totalTime = minutes * 60 + seconds;
      timeRemaining = totalTime;
    }
    clearInterval(timer); // 清除任何之前的计时器
    const minuteBox = document.getElementById("minuteBox");
    const secondBox = document.getElementById("secondBox");
    timer = setInterval(() => {
      if (timeRemaining <= 0) {
        clearInterval(timer);
        alert("计时结束！");
        logPractice(); // 记录日志
        try {
          audio.play();
        } catch (err) {
          console.error("音频播放失败", err);
        }
        return;
      }
      timeRemaining--;
      const updatedMinutes = Math.floor(timeRemaining / 60);
      const updatedSeconds = timeRemaining % 60;
      minuteBox.textContent = updatedMinutes < 10 ? "0" + updatedMinutes : updatedMinutes;
      secondBox.textContent = updatedSeconds < 10 ? "0" + updatedSeconds : updatedSeconds;
    }, 1000);
  }
  function pauseTimer() {
    clearInterval(timer);
    isPaused = true; // 标记为暂停状态
  }
  function resetTimer() {
    clearInterval(timer);
    timeRemaining = 0;
    totalTime = 0;
    document.getElementById("minuteBox").textContent = "00";
    document.getElementById("secondBox").textContent = "00";
    document.getElementById("timerDisplay").classList.add("hidden");
    isPaused = false;
  }
  function logPractice() {
    const content = document.getElementById("practiceContent").value.trim() || "空白";
    // 计算实际练习时间
    const elapsedTime = totalTime - timeRemaining;
    const elapsedMinutes = Math.floor(elapsedTime / 60);
    const elapsedSeconds = elapsedTime % 60;
    const logEntry = document.createElement("div");
    logEntry.innerHTML = `内容：${content} | 时长：${elapsedMinutes} 分 ${elapsedSeconds} 秒 
      <button onclick="deleteLog(this)">🗑️</button>`;
    logContainer.appendChild(logEntry);
  }
  function deleteLog(button) {
    button.parentElement.remove();
  }
    function exportLog() {
      const logContent = logContainer.innerText;
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = 500;
      canvas.height = logContent.split("\n").length * 20 + 40;
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = "16px Arial";
      ctx.fillStyle = "#333";
      const lines = logContent.split("\n");
      let y = 20;
      lines.forEach(line => {
        ctx.fillText(line, 20, y);
        y += 20;
      });
      // 获取当前日期并格式化为年月日
      const now = new Date();
      const dateString = now.toISOString().split('T')[0]; // 获取格式：YYYY-MM-DD
      const dataURL = canvas.toDataURL();
      const link = document.createElement("a");
      link.href = dataURL;
      link.download = `${dateString}_练习记录.png`;  // 使用格式化后的日期作为文件名
      link.click();
    }
  </script>
</body>

  let s1 = '2024-11-4'; 
  s1 = new Date(s1.replace(/-/g, "/"));
  let s2 = new Date();
  let timeDifference = s2.getTime() - s1.getTime();

  let days = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
  let hours = Math.floor((timeDifference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  let minutes = Math.floor((timeDifference % (1000 * 60 * 60)) / (1000 * 60));

  let result = days + "天" + hours + "小时" + minutes + "分钟";
  document.getElementById('runningdays').innerHTML = result;
