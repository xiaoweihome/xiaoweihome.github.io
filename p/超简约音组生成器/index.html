    <!DOCTYPE html>

    <title>音符分组生成器</title>
    <style>
        body{font-family:'Arial',sans-serif;margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background-color:#f0f2f5;}
        .program-container{background:#fff;padding:20px 70px;border-radius:12px;box-shadow:0 8px 15px rgba(0,0,0,0.1);text-align:center;max-width:2000px;box-sizing:border-box;position:relative;}
        .form-group{display:flex;flex-direction:column;align-items:center;margin-bottom:20px;}
        .form-group label{margin-bottom:5px;font-size:16px;font-weight:bold;color:#333;}
        .form-group select,.form-group input{padding:10px;border:1px solid #ccc;border-radius:6px;font-size:14px;width:80%;margin-top:10px;box-sizing:border-box;transition:all 0.3s ease;}
        .form-group select:focus,.form-group input:focus{border-color:#4CAF50;box-shadow:0 0 5px rgba(76,175,80,0.5);}
        .checkbox-group{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;margin-top:20px;padding:10px 0;}
        .checkbox-group label{font-size:14px;color:#555;display:inline-block;}
        .checkbox-group input{margin-right:5px;margin-top:5px;}
        .button-container{display:flex;flex-direction:column;gap:12px;margin-top:20px;width:80%;margin-left:auto;margin-right:auto;}
        button{background-color:#4CAF50;color:white;padding:14px 0;border:none;border-radius:10px;cursor:pointer;font-size:18px;transition:background-color 0.3s ease;width:100%;}
        button:hover{background-color:#45a049;}
        .export-btn{background-color:#2196F3;}
        .export-btn:hover{background-color:#1976D2;}
        .result{margin-top:20px;font-size:16px;color:#333;font-weight:bold;display:flex;flex-wrap:wrap;gap:15px;justify-content:center;}
        .result .group{background-color:#f4f4f4;padding:8px 15px;border-radius:6px;box-shadow:0 4px 10px rgba(0,0,0,0.1);cursor:pointer;transition:background 0.2s;}
        .result .group:hover{background-color:#e0e0e0;}
        .permutation-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:8px;box-shadow:0 0 15px rgba(0,0,0,0.2);z-index:1000;max-height:80vh;overflow-y:auto;width:320px;}
        .permutation-item{padding:8px;margin:4px;background:#f5f5f5;border-radius:4px;transition:background 0.2s;display:flex;justify-content:space-between;align-items:center;}
        .permutation-item:hover{background:#4CAF50;color:white;}
        .modal-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);z-index:999;}
        .copy-btn{background:rgba(255,255,255,0.2);border:none;padding:4px 8px;border-radius:3px;cursor:pointer;font-size:12px;transition:all 0.2s;}
        .permutation-item:hover .copy-btn{background:rgba(255,255,255,0.3);}
        .permutation-item:hover .copy-btn:hover{background:rgba(255,255,255,0.4);}
    </style>
</head>
<body>
    <div class="program-container">
        <div class="form-group">
            <label for="beats">拍子：</label>
            <select id="beats">
                <option value="1">1拍</option><option value="2">2拍</option><option value="3">3拍</option>
                <option value="4">4拍</option><option value="5">5拍</option><option value="6">6拍</option>
                <option value="7">7拍</option><option value="8">8拍</option>
            </select>
        </div>
        <div class="form-group">
            <label for="rate">速率：</label>
            <select id="rate">
                <option value="2">八分音符</option><option value="3">三连音</option>
                <option value="4">十六分音符</option><option value="6">六连音</option>
                <option value="8">三十二分音符</option>
            </select>
        </div>
        <div class="form-group">
            <label for="groupCount">分组数量：</label>
            <input id="groupCount" type="number" min="1" placeholder="输入数量（可选）">
        </div>
        <div class="checkbox-group">
            <label><input type="checkbox" value="1">1</label><label><input type="checkbox" value="2">2</label>
            <label><input type="checkbox" value="3">3</label><label><input type="checkbox" value="4">4</label>
            <label><input type="checkbox" value="5">5</label><label><input type="checkbox" value="6">6</label>
            <label><input type="checkbox" value="7">7</label><label><input type="checkbox" value="8">8</label>
        </div>
        <div class="button-container">
            <button onclick="generateAllGroupings()">显示所有分组</button>
            <button class="export-btn" onclick="exportResults()" id="exportBtn" disabled>导出结果</button>
        </div>
        <div class="result" id="result"></div>
    </div>
    <script>
        let currentResults = [];
        function generateAllGroupings(){
            const beats=parseInt(document.getElementById('beats').value);
            const rate=parseInt(document.getElementById('rate').value);
            const groupCount=parseInt(document.getElementById('groupCount').value)||0;
            const checkboxes=document.querySelectorAll('.checkbox-group input[type="checkbox"]:checked');
            const availableNumbers=Array.from(checkboxes).map(c=>parseInt(c.value));
            const totalNotes=beats*rate;
            if(groupCount>0&&groupCount>totalNotes){alert('分组数量不能大于总音符数');return;}
            let results=[];
            function fc(rn,cg,rg){if(rg===0){if(rn===0)results.push(cg);return;}
                for(let n of availableNumbers){if(rn-n>=0)fc(rn-n,[...cg,n],rg-1);}}
            function fac(rn,cg){if(rn===0){results.push(cg);return;}
                for(let n of availableNumbers){if(rn-n>=0)fac(rn-n,[...cg,n]);}}
            groupCount>0?fc(totalNotes,[],groupCount):fac(totalNotes,[]);
            if(results.length===0&&groupCount===0)results.push(...fn(totalNotes,availableNumbers));
            results=results.map(g=>g.sort((a,b)=>a-b).join(','));
            currentResults=[...new Set(results)];
            document.getElementById('exportBtn').disabled=false;
            displayResults(currentResults);}
        function fn(tn,an){let mn=tn,fg=[],a=0,m=100;
            while(mn>0&&a<m){let r=an[Math.floor(Math.random()*an.length)];
                if(mn-r>=0){fg.push(r);mn-=r;}a++;}
            if(mn>0){if(mn===9)fg.push(8,1);else if(mn===10)fg.push(8,2);else fg.push(mn);}
            return[fg];}
        function displayResults(rs){const rd=document.getElementById('result');
            rd.innerHTML=rs.length?rs.map(r=>`<div class="group" onclick="showPermutations(event,'${r}')">${r}</div>`).join(''):'没有找到有效的分组组合。';
            document.getElementById('exportBtn').disabled=!rs.length;}
        function showPermutations(e,a){const p=generateUP(a);
            const m=document.createElement('div');
            m.className='permutation-modal';
            m.innerHTML=`<h3 style="margin:0 0 15px;color:#333;">${a} 的所有排列</h3>
                <div style="max-height:400px;overflow-y:auto;">${p.map(p=>`
                    <div class="permutation-item">
                        <span>${p}</span>
                        <button class="copy-btn" onclick="copyText(event,'${p}')">复制</button>
                    </div>
                `).join('')}</div>`;
            const mask=document.createElement('div');
            mask.className='modal-mask';
            mask.onclick=()=>{document.body.removeChild(m);document.body.removeChild(mask);};
            document.body.appendChild(mask);document.body.appendChild(m);}
        function generateUP(s){const r=new Set(),a=s.split(',').map(Number);
            function p(c,rm){if(rm.length===0){r.add(c.join(','));return;}
                const u=new Set();for(let i=0;i<rm.length;i++){if(!u.has(rm[i])){u.add(rm[i]);p([...c,rm[i]],[...rm.slice(0,i),...rm.slice(i+1)]);}}}
            p([],a);return Array.from(r);}
        function copyText(event,text){navigator.clipboard.writeText(text)
            .then(()=>{
                const btn=event.target;
                btn.textContent='已复制!';
                btn.style.background='#45a049';
                setTimeout(()=>{
                    btn.textContent='复制';
                    btn.style.background='rgba(255,255,255,0.2)';
                },1500);})
            .catch(err=>{console.error('复制失败:',err);alert('复制失败，请手动选择文本复制');});}
        function exportResults(){if(!currentResults.length){alert('没有可导出的结果');return;}
            const t=new Date().toLocaleString().replace(/[/:]/g,'-');
            const f=`音符分组-${t}.txt`,c=currentResults.join('\n');
            const b=new Blob([c],{type:'text/plain'}),u=URL.createObjectURL(b);
            const a=document.createElement('a');a.href=u;a.download=f;
            document.body.appendChild(a);a.click();document.body.removeChild(a);
            URL.revokeObjectURL(u);
            const btn=document.getElementById('exportBtn');
            btn.textContent='已导出!';
            setTimeout(()=>{btn.textContent='导出结果';},2000);}
    </script>
</body>

<script>
  let s1 = '2024-11-4'; 
  s1 = new Date(s1.replace(/-/g, "/"));
  let s2 = new Date();
  let timeDifference = s2.getTime() - s1.getTime();

  let days = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
  let hours = Math.floor((timeDifference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  let minutes = Math.floor((timeDifference % (1000 * 60 * 60)) / (1000 * 60));

  let result = days + "天" + hours + "小时" + minutes + "分钟";
  document.getElementById('runningdays').innerHTML = result;
