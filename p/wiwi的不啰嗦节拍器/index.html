    <!DOCTYPE html><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>不囉唆的節拍器 3.0 by NiceChord 好和弦</title><style>a{color:rgb(17,81,136);font-weight:bolder;}input{font-family:monospace;margin-top:0px;font-size:24px;}button{padding:1px 14px;font-size:20px;font-family:-apple-system,BlinkMacSystemFont,'Roboto',sans-serif;border-radius:3px;border:1px #777;background:#eee;box-shadow:0px 0.5px 1px rgba(0,0,0,0.2),inset 0px 0.5px 0.5px rgba(255,255,255,0.5),0px 0px 0px 0.5px rgba(0,0,0,0.2);color:#333;user-select:none;-webkit-user-select:none;touch-action:manipulation;}button:focus{box-shadow:inset 0px 0.8px 0px -0.25px rgba(255,255,255,0.2),0px 0.5px 1px rgba(0,0,0,0.1),0px 0px 0px 3.5px rgba(58,108,217,0.5);outline:0;}.error-message{color:red;font-size:14px;margin-left:10px;}.preset-buttons{margin-top:8px;}.preset-buttons button{margin-right:2px;font-size:16px;padding:0px 8px;}#subbeats{font-size:16px}p{line-height:1.1;margin-bottom:10px;margin-top:0px;}p+p{margin-top:0px;}</style><body><p><b>不囉唆的節拍器 3.0</b> by <a href="https://nicechord.com/">NiceChord 好和弦</a><br></p><input id="bpm" type="number" value="100" min="1" max="999" onchange="updateBPM();" onclick="select_all();" onkeypress="onTestChange();"><button id="start" type="button" ontouchend="metrostart();" onclick="metrostart();">開始</button><button id="stop" type="button" ontouchend="metrostop();" onclick="metrostop();">停止</button><p><br>輸入拍子細分割（0 到 1 之間數字，用逗號分隔）：</p><input id="subbeats" type="text" placeholder="例如：0.5 或 0.25,0.5,0.75" oninput="updateSubBeats();" style="width:300px;"><span id="error-message" class="error-message"></span><p><br>快速設定：</p><div class="preset-buttons"><button onclick="setPreset('0.5')">八分</button><button onclick="setPreset('0.333,0.666')">三連音</button><button onclick="setPreset('0.25,0.5,0.75')">十六分</button><button onclick="setPreset('0.75')">附點</button><button onclick="setPreset('0.666')">66% Swing</button></div><div class="preset-buttons"><button onclick="setPreset('0.2,0.4,0.6,0.8')">五連音</button><button onclick="setPreset('0.166,0.333,0.5,0.666,0.833')">六連音</button><button onclick="setPreset('0.143,0.286,0.429,0.571,0.714,0.857')">七連音</button><button onclick="setPreset('0.333,0.5,0.666')">二對三</button><button onclick="setPreset('0.58')">有點 Swing</button></div><div class="preset-buttons"><button onclick="setPreset('')">清除</button></div><script type="text/javascript">let audioContext=null;let isPlaying=false;let bpm=100;let subBeatPositions=[];let lookahead=25;let scheduleAheadTime=0.1;let nextNoteTime=0.0;let timerID=null;let noteLength=0.05;let subBeatLength=0.03;let noteFrequency=523.25;let subBeatFrequency=392;function init(){bpm=document.getElementById('bpm').value;try{window.AudioContext=window.AudioContext||window.webkitAudioContext;audioContext=new AudioContext();}catch(e){alert('Web Audio API 不被您的瀏覽器支援。');}}function scheduleNote(time){const osc=audioContext.createOscillator();osc.type='square';osc.frequency.value=noteFrequency;const gainNode=audioContext.createGain();gainNode.gain.value=0.25;gainNode.gain.setValueAtTime(0.25,time);gainNode.gain.exponentialRampToValueAtTime(0.01,time+noteLength);osc.connect(gainNode);gainNode.connect(audioContext.destination);osc.start(time);osc.stop(time+noteLength);}function scheduleSubBeat(time){const osc=audioContext.createOscillator();osc.type='square';osc.frequency.value=subBeatFrequency;const gainNode=audioContext.createGain();gainNode.gain.value=0.15;gainNode.gain.setValueAtTime(0.15,time);gainNode.gain.exponentialRampToValueAtTime(0.01,time+subBeatLength);osc.connect(gainNode);gainNode.connect(audioContext.destination);osc.start(time);osc.stop(time+subBeatLength);}function scheduler(){while(nextNoteTime<audioContext.currentTime+scheduleAheadTime){scheduleNote(nextNoteTime);let secondsPerBeat=60.0/bpm;subBeatPositions.forEach(position=>{scheduleSubBeat(nextNoteTime+secondsPerBeat*position);});nextBeat();}timerID=setTimeout(scheduler,lookahead);}function nextBeat(){let secondsPerBeat=60.0/bpm;nextNoteTime+=secondsPerBeat;}function metrostart(){if(!audioContext){init();}else if(audioContext.state==='suspended'){audioContext.resume();}if(!isPlaying){isPlaying=true;nextNoteTime=audioContext.currentTime;scheduler();}}function metrostop(){isPlaying=false;clearTimeout(timerID);}function updateBPM(){bpm=parseInt(document.getElementById('bpm').value);if(bpm<1)bpm=1;if(bpm>999)bpm=999;}function parseSubBeats(inputString){if(!inputString||inputString.trim()===''){return [];}try{const values=inputString.split(',').map(s=>s.trim()).filter(s=>s!=='');const validPositions=[];for(let value of values){const num=parseFloat(value);if(isNaN(num))continue;if(num>0&&num<1){validPositions.push(num);}}return [...new Set(validPositions)].sort();}catch(e){throw new Error('解析錯誤');}}function updateSubBeats(){const input=document.getElementById('subbeats');const errorElement=document.getElementById('error-message');try{subBeatPositions=parseSubBeats(input.value);errorElement.textContent='';}catch(e){errorElement.textContent='輸入格式錯誤';subBeatPositions=[];}}function setPreset(preset){document.getElementById('subbeats').value=preset;updateSubBeats();}function select_all(){document.getElementById('bpm').select();}function onTestChange(){var key=window.event.keyCode;if(key===13){metrostart();return false;}else{return true;}}window.addEventListener('load',function(){init();});</script></body>

  let timeDifference = s2.getTime() - s1.getTime();

  let days = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
  let hours = Math.floor((timeDifference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  let minutes = Math.floor((timeDifference % (1000 * 60 * 60)) / (1000 * 60));

  let result = days + "天" + hours + "小时" + minutes + "分钟";
  document.getElementById('runningdays').innerHTML = result;
</script>
